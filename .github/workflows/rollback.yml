name: Rollback/Revert

on:
  repository_dispatch:
    types: [rollback]

permissions:
  contents: write

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - name: Log event payload
        run: |
          echo "Event Type: rollback"
          echo "Target Commit: ${{ github.event.client_payload.commit }}"
          echo "Branch: ${{ github.event.client_payload.branch || 'main' }}"
          echo "Method: ${{ github.event.client_payload.method || 'reset' }}"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.branch || 'main' }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Reset to target commit
        if: ${{ github.event.client_payload.method == 'reset' || github.event.client_payload.method == '' }}
        env:
          TARGET_COMMIT: ${{ github.event.client_payload.commit }}
        run: |
          echo "Resetting to commit: $TARGET_COMMIT"
          git reset --hard $TARGET_COMMIT
          git checkout $GITHUB_SHA -- .github/workflows/
          git commit --amend --no-edit
          git push origin ${{ github.event.client_payload.branch || 'main' }} --force
          echo "Reset complete. Branch is now at $TARGET_COMMIT"

      - name: Revert target commit
        if: ${{ github.event.client_payload.method == 'revert' }}
        env:
          TARGET_COMMIT: ${{ github.event.client_payload.commit }}
        run: |
          echo "Reverting commit: $TARGET_COMMIT"
          git revert --no-edit $TARGET_COMMIT
          git push origin ${{ github.event.client_payload.branch || 'main' }}
          echo "Revert complete. New commit created to undo $TARGET_COMMIT"

      - name: Rollback complete
        run: |
          echo "Rollback job finished successfully"
          echo "Current HEAD: $(git rev-parse HEAD)"
